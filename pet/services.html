<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - FurEver Home Available Pets</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <a href="index.html" class="logo-link">
            <img src="images/logo.png" alt="FurEver Home Logo" class="logo-img">
            <div class="logo">FurEver<span>Home</span></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="login.html" class="login-btn" id="loginBtn">Login</a>
        <button class="login-btn" id="logoutBtn" style="display: none; cursor: pointer;" onclick="logout()">Logout</button>
    </nav>

    <section id="adopt">
        <h2 style="color: var(--primary-dark); margin-bottom: 2rem;">Browse Our Pets</h2>
        <div class="services-layout">
            <aside class="sidebar">
                <h3>Filter by Animal</h3>
                <div class="filter-group">
                    <button class="filter-btn" onclick="fetchPets('')">All Animals</button>
                    <button class="filter-btn" onclick="fetchPets('Dog')">Dogs</button>
                    <button class="filter-btn" onclick="fetchPets('Cat')">Cats</button>
                    <button class="filter-btn" onclick="fetchPets('Rabbit')">Rabbits</button>
                </div>
            </aside>
            <main class="pet-list" id="petList">
                <!-- Pets will be loaded here via JS -->
                <p>Loading pets...</p>
            </main>
        </div>
    </section>

    <!-- Adoption Modal -->
    <div id="adoptionModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Adoption Request Form</h2>
            <form id="adoptionForm">
                <input type="hidden" id="modalPetId">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label for="reason">Reason for Adoption</label>
                    <textarea id="reason" placeholder="Why do you want to adopt this pet?" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="confirmAdoptBtn">Submit Request</button>
            </form>
        </div>
    </div>



    <footer>
        <p>&copy; 2026 FurEver Home Adoption Center. Built with Love and Lavender.</p>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
