<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FurEver Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body style="background: var(--primary-light);">
    <nav>
        <a href="index.html" class="logo-link">
            <img src="images/logo.png" alt="FurEver Home Logo" class="logo-img">
            <div class="logo">FurEver<span>Home</span></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <h2 style="text-align: center; color: var(--primary-dark); margin-bottom: 2rem;">Login to Adopt</h2>
        <form class="login-form" id="loginForm">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--primary-dark);">
            Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 500; text-decoration: none;">Sign up here</a>
        </p>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
