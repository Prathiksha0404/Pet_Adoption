<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FurEver Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-layout { display: flex; min-height: 80vh; gap: 2rem; padding: 2rem 5%; }
        .admin-sidebar { width: 250px; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-main { flex: 1; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-nav-btn { display: block; width: 100%; text-align: left; padding: 1rem; margin-bottom: 0.5rem; background: none; border: none; font-size: 1.1rem; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .admin-nav-btn.active, .admin-nav-btn:hover { background: var(--primary-light); color: var(--primary-dark); font-weight: bold; }
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--primary-light); color: var(--primary-dark); }
        .action-btn { padding: 0.5rem 1rem; border: none; border-radius: 5px; cursor: pointer; color: white; margin-right: 0.5rem; }
        .btn-approve { background: #4CAF50; }
        .btn-reject { background: #f44336; }
        
        .add-pet-form { background: var(--gray); padding: 2rem; border-radius: 10px; margin-bottom: 2rem; }
        .add-pet-form input, .add-pet-form select, .add-pet-form textarea { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; }
        .add-pet-form button { background: var(--primary); color: white; padding: 1rem 2rem; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body style="background: var(--primary-light);">
    <nav>
        <div class="logo-link">
            <img src="images/logo.png" alt="Logo" class="logo-img">
            <div class="logo">Admin<span>Panel</span></div>
        </div>
        <button class="login-btn" onclick="adminLogout()" style="cursor: pointer; border: none;">Logout</button>
    </nav>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <button class="admin-nav-btn active" onclick="switchTab('requests')">Adoption Requests</button>
            <button class="admin-nav-btn" onclick="switchTab('approved')">Approved History</button>
            <button class="admin-nav-btn" onclick="switchTab('manage')">Manage Pets</button>
        </aside>

        <main class="admin-main">
            <!-- Requests Panel -->
            <div id="requests" class="admin-panel active">
                <h2 style="color: var(--primary-dark);">Pending Adoption Requests</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Pet Name</th>
                            <th>Applicant</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Reason</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="requestsTableBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Approved Panel -->
            <div id="approved" class="admin-panel">
                <h2 style="color: var(--primary-dark);">Approved Adoptions History</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Pet Name</th>
                            <th>Applicant</th>
                            <th>Email</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody id="approvedTableBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Manage Pets Panel -->
            <div id="manage" class="admin-panel">
                <h2 style="color: var(--primary-dark);">Manage Pets</h2>
                
                <div class="add-pet-form">
                    <h3 style="margin-bottom: 1rem; color: var(--primary-dark);">Add New Pet</h3>
                    <form id="addPetForm">
                        <input type="text" id="petName" placeholder="Pet Name" required>
                        <select id="petType" required>
                            <option value="">Select Type</option>
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                            <option value="Rabbit">Rabbit</option>
                        </select>
                        <input type="text" id="petBreed" placeholder="Breed">
                        <input type="text" id="petAge" placeholder="Age (e.g. 2 months)">
                        <input type="file" id="petImage" name="petImage" accept="image/*" required>
                        <textarea id="petFeature" placeholder="Unique Feature"></textarea>
                        <textarea id="petDesc" placeholder="Description"></textarea>
                        <button type="submit">Add Pet</button>
                    </form>
                </div>

                <h3 style="margin-bottom: 1rem; color: var(--primary-dark);">All Pets Inventory</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="allPetsTableBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
